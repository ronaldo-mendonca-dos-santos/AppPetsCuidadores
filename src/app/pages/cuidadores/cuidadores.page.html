<ion-header>
  <ion-toolbar>
    <ion-title>Cuidadores</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="novoCuidador()">+ Novo</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let cuidador of cuidadores">
      <ion-label>
        <h2>{{ cuidador.nome }}</h2>
        <p>Tel: {{ cuidador.telefone }}</p>
        <p>Exp: {{ cuidador.experiencia }} anos</p>
        <p>Especialidades: {{ cuidador.especialidades }}</p>
      </ion-label>
      <ion-buttons slot="end">
        <ion-button color="primary" (click)="editarCuidador(cuidador)">Editar</ion-button>
        <ion-button color="danger" (click)="excluirCuidador(cuidador.id!)">Excluir</ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>
</ion-content>
