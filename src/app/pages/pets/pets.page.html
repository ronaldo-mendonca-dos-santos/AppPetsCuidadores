<ion-header>
  <ion-toolbar>
    <ion-title>Pets</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="novoPet()">+ Novo</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let pet of pets">
      <ion-label>
        <h2>{{ pet.nome }}</h2>
        <p>{{ pet.especie }} - {{ pet.raca }}</p>
      </ion-label>
      <ion-buttons slot="end">
        <ion-button color="primary" (click)="editarPet(pet)">Editar</ion-button>
        <ion-button color="danger" (click)="excluirPet(pet.id!)">Excluir</ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>
</ion-content>
